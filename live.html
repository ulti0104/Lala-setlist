<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ライブ詳細 | セトリまとめ</title>
  <meta name="description" content="ライブのセットリスト詳細ページです。" />
  <link rel="stylesheet" href="style.css" />

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-FFBFNCYXK6"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-FFBFNCYXK6');
  </script>
</head>

<body>
  <header class="site-header">
    <div class="wrap">
      <p class="site-subtitle">LIVE SETLIST</p>
      <h1 class="site-title" id="pageTitle">ライブ詳細</h1>
      <p class="site-desc" id="pageVenue">会場情報</p>
    </div>
  </header>

  <main class="wrap detail-main">
    <article class="detail-card" id="detailCard" style="display: none;">
      <h2 class="detail-title">セットリスト</h2>

      <div class="detail-image-wrap" id="detailImageWrap" style="display: none;">
        <img id="detailImage" class="detail-image" src="" alt="ライブ画像" />
      </div>

      <div class="detail-meta">
        <div><strong>日付：</strong><span id="metaDate"></span></div>
        <div><strong>会場：</strong><span id="metaVenue"></span></div>
        <div><strong>都市：</strong><span id="metaCity"></span></div>
      </div>

      <!-- コピーボタン -->
      <div class="copy-actions">
        <button id="copySetlistButton" class="copy-setlist-btn" type="button">セットリストをコピー</button>
      </div>

      <section>
        <h3 class="detail-section-title">本編</h3>
        <div class="setlist-box">
          <ol class="setlist" id="mainSetlist"></ol>
        </div>
      </section>

      <section id="encoreSection" style="display: none;">
        <h3 class="detail-section-title">アンコール</h3>
        <div class="setlist-box">
          <ol class="setlist" id="encoreSetlist"></ol>
        </div>
      </section>

      <!-- Apple Music プレイヤー -->
      <section id="applePlayerSection" class="apple-player-section" style="display: none;">
        <h3 class="detail-section-title">Apple Music</h3>
        <p id="applePlayerTitle" class="apple-player-title"></p>
        <iframe
          id="applePlayerFrame"
          class="apple-player-frame"
          allow="autoplay *; encrypted-media *; fullscreen *; clipboard-write"
          frameborder="0"
          sandbox="allow-forms allow-popups allow-same-origin allow-scripts allow-top-navigation-by-user-activation"
        ></iframe>
      </section>

      <section class="memo-box" id="memoSection" style="display: none;">
        <h3 class="detail-section-title" style="margin-top: 0;">メモ</h3>
        <p id="memoText"></p>
      </section>

      <a class="back-link" href="index.html">← 一覧に戻る</a>
    </article>

    <article class="detail-card" id="notFoundCard" style="display: none;">
      <h2 class="detail-title">ライブが見つかりません</h2>
      <p>指定されたライブ情報が存在しないか、URLが正しくありません。</p>
      <a class="back-link" href="index.html">← 一覧に戻る</a>
    </article>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p>© 2026 セトリまとめ</p>
    </div>
  </footer>

  <script src="data.js"></script>
  <script src="songLinks.js"></script>
  <script>
    function toAppleEmbedUrl(url) {
      if (!url) return "";

      try {
        const u = new URL(url);

        if (u.hostname === "music.apple.com") {
          u.hostname = "embed.music.apple.com";
          return u.toString();
        }

        return url;
      } catch {
        return url;
      }
    }

    function showApplePlayer(songName, url) {
      const section = document.getElementById("applePlayerSection");
      const title = document.getElementById("applePlayerTitle");
      const frame = document.getElementById("applePlayerFrame");

      if (!section || !title || !frame || !url) return;

      title.textContent = `「${songName}」`;
      frame.src = toAppleEmbedUrl(url);
      section.style.display = "block";

      section.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    function createSongItem(song) {
      const li = document.createElement("li");
      li.className = "setlist-item";

      const songContent = document.createElement("div");
      songContent.className = "song-content";

      const songText = document.createElement("span");
      songText.className = "song-name";
      songText.textContent = song;
      songContent.appendChild(songText);

      // songLinks が存在し、かつ該当曲のURLがある場合のみボタン表示
      if (typeof songLinks !== "undefined" && songLinks[song]) {
        const button = document.createElement("button");
        button.className = "listen-btn inline-mini";
        button.textContent = "▶︎";
        button.type = "button";
        button.setAttribute("aria-label", `${song} をApple Musicで聴く`);

        button.addEventListener("click", () => {
          showApplePlayer(song, songLinks[song]);
        });

        songContent.appendChild(button);
      }

      li.appendChild(songContent);

      return li;
    }

    async function copySetlistText(live) {
      if (!live) return;

      const lines = [];

      // 本編
      (live.setlistMain || []).forEach((song, index) => {
        lines.push(`${index + 1}. ${song}`);
      });

      // アンコール
      if (live.setlistEncore && live.setlistEncore.length > 0) {
        lines.push("");
        lines.push("【アンコール】");
        live.setlistEncore.forEach((song, index) => {
          lines.push(`${index + 1}. ${song}`);
        });
      }

      const text = lines.join("\n");

      try {
        await navigator.clipboard.writeText(text);
        const btn = document.getElementById("copySetlistButton");
        if (btn) {
          const original = btn.textContent;
          btn.textContent = "コピーしました！";
          setTimeout(() => {
            btn.textContent = original;
          }, 1600);
        }
      } catch (error) {
        alert("コピーに失敗しました。");
        console.error(error);
      }
    }

    const params = new URLSearchParams(window.location.search);
    const liveId = params.get("id");

    const detailCard = document.getElementById("detailCard");
    const notFoundCard = document.getElementById("notFoundCard");
    const copySetlistButton = document.getElementById("copySetlistButton");

    const live = liveData.find(item => item.id === liveId);

    if (!live) {
      document.getElementById("pageTitle").textContent = "ライブが見つかりません";
      document.getElementById("pageVenue").textContent = "";
      notFoundCard.style.display = "block";
    } else {
      document.title = `${live.title} | セトリまとめ`;

      document.getElementById("pageTitle").textContent = live.title;
      document.getElementById("pageVenue").textContent = live.venue;

      document.getElementById("metaDate").textContent = live.date;
      document.getElementById("metaVenue").textContent = live.venue;
      document.getElementById("metaCity").textContent = live.city;

      // 画像表示（image があれば表示、なければ非表示）
      const detailImageWrap = document.getElementById("detailImageWrap");
      const detailImage = document.getElementById("detailImage");

      if (live.image && live.image.trim() !== "") {
        detailImage.src = live.image;
        detailImage.alt = `${live.title} のライブ画像`;
        detailImageWrap.style.display = "block";
      }

      const mainSetlist = document.getElementById("mainSetlist");
      (live.setlistMain || []).forEach(song => {
        mainSetlist.appendChild(createSongItem(song));
      });

      const encoreSection = document.getElementById("encoreSection");
      const encoreSetlist = document.getElementById("encoreSetlist");

      if (live.setlistEncore && live.setlistEncore.length > 0) {
        encoreSection.style.display = "block";

        live.setlistEncore.forEach(song => {
          encoreSetlist.appendChild(createSongItem(song));
        });
      }

      const memoSection = document.getElementById("memoSection");
      const memoText = document.getElementById("memoText");

      if (live.note && live.note.trim() !== "") {
        memoSection.style.display = "block";
        memoText.textContent = live.note;
      }

      copySetlistButton.addEventListener("click", () => {
        copySetlistText(live);
      });

      detailCard.style.display = "block";
    }
  </script>
</body>
</html>
