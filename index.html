<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lala セトリまとめ</title>
  <meta name="description" content="Lalaのライブのセットリストをまとめたページ" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <p class="site-subtitle">SETLIST ARCHIVE</p>
      <h1 class="site-title">Lala セットリストまとめ</h1>
      <p class="site-desc">ライブごとのセットリストを一覧でまとめています</p>
    </div>
  </header>

  <main class="wrap">
    <section class="notice-box">
      <p></p>
    </section>

    <section class="section-block">
      <div class="section-head">
        <h2 class="section-title">ライブ一覧</h2>
        <p class="count-text" id="liveCount">0件</p>
      </div>

      <!-- ライブ情報検索 -->
      <div class="search-box">
        <label class="search-label" for="searchInput">ライブ検索</label>
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="ライブ名・会場・都市名・ツアー名で検索"
        />
      </div>

      <!-- 曲名検索 -->
      <div class="search-box">
        <label class="search-label" for="songSearchInput">曲名検索</label>
        <input
          type="text"
          id="songSearchInput"
          class="search-input"
          placeholder="曲名を入れると、その曲が含まれる公演だけ表示"
        />
      </div>

      <div class="filter-actions">
        <button id="clearButton" class="clear-button" type="button">検索をクリア</button>
      </div>

      <div class="live-grid" id="liveList"></div>

      <p class="empty-text" id="emptyText" style="display: none;">
        該当するライブがありません。
      </p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p>© 2026 セトリまとめ</p>
    </div>
  </footer>

  <script src="data.js"></script>
  <script>
    const liveList = document.getElementById("liveList");
    const liveCount = document.getElementById("liveCount");
    const searchInput = document.getElementById("searchInput");
    const songSearchInput = document.getElementById("songSearchInput");
    const emptyText = document.getElementById("emptyText");
    const clearButton = document.getElementById("clearButton");

    // 新しい順
    const sortedLives = [...liveData].reverse();

    function normalizeText(text) {
      return (text || "")
        .toString()
        .toLowerCase()
        .replace(/\s+/g, "")
        .replace(/[　]/g, "");
    }

    function renderLives() {
      const liveKeyword = normalizeText(searchInput.value);
      const songKeyword = normalizeText(songSearchInput.value);

      const filtered = sortedLives.filter(live => {
        // ライブ情報検索対象
        const liveTarget = normalizeText([
          live.date,
          live.title,
          live.venue,
          live.city,
          live.artist,
          live.tour
        ].join(" "));

        // 曲検索対象（本編 + アンコール）
        const songs = [
          ...(live.setlistMain || []),
          ...(live.setlistEncore || [])
        ];
        const songTarget = normalizeText(songs.join(" "));

        const matchLive = !liveKeyword || liveTarget.includes(liveKeyword);
        const matchSong = !songKeyword || songTarget.includes(songKeyword);

        return matchLive && matchSong;
      });

      liveList.innerHTML = "";

      if (filtered.length === 0) {
        emptyText.style.display = "block";
      } else {
        emptyText.style.display = "none";
      }

      liveCount.textContent = `${filtered.length}件`;

      filtered.forEach(live => {
        const songs = [
          ...(live.setlistMain || []),
          ...(live.setlistEncore || [])
        ];

        const isSongMatched = songKeyword && songs.some(song =>
          normalizeText(song).includes(songKeyword)
        );

        const card = document.createElement("a");
        card.className = "live-card";
        card.href = `live.html?id=${encodeURIComponent(live.id)}`;

        card.innerHTML = `
          <div class="live-date">${live.date}</div>
          <h3 class="live-name">${live.title}</h3>
          <p class="live-place">${live.venue}</p>
          <p class="live-meta">${live.artist} / ${live.city}</p>
          ${
            isSongMatched
              ? `<p class="song-hit-badge">この公演に曲名が含まれています</p>`
              : ""
          }
          <span class="live-link">セトリを見る →</span>
        `;

        liveList.appendChild(card);
      });
    }

    searchInput.addEventListener("input", renderLives);
    songSearchInput.addEventListener("input", renderLives);

    clearButton.addEventListener("click", () => {
      searchInput.value = "";
      songSearchInput.value = "";
      renderLives();
    });

    renderLives();
  </script>
</body>
</html>
