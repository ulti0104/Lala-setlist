<body>
  <header class="site-header">
    <div class="wrap">
      <p class="site-subtitle">SONG ARCHIVE</p>
      <h1 class="site-title">Lala 曲一覧</h1>
      <p class="site-desc">
        曲名をクリックすると、その曲が含まれる公演を検索できます<br>
      </p>

      <div class="top-nav-buttons">
        <a href="index.html" class="top-nav-button">ライブ一覧へ戻る</a>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="section-block">
      <div class="section-head">
        <h2 class="section-title">曲一覧</h2>
        <p class="count-text" id="songCount">0曲</p>
      </div>

      <!-- 曲検索 -->
      <div class="search-box">
        <label class="search-label" for="songListSearchInput">曲名検索</label>
        <input
          type="text"
          id="songListSearchInput"
          class="search-input"
          placeholder="曲名で検索"
        />
      </div>

      <div class="filter-actions">
        <button id="songClearButton" class="clear-button" type="button">検索をクリア</button>
      </div>

      <div class="song-list" id="songList"></div>

      <p class="empty-text" id="songEmptyText" style="display: none;">
        該当する曲がありません。
      </p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p>© 2026 セトリまとめ</p>
    </div>
  </footer>

  <script src="data.js"></script>
  <script>
    const songList = document.getElementById("songList");
    const songCount = document.getElementById("songCount");
    const songListSearchInput = document.getElementById("songListSearchInput");
    const songClearButton = document.getElementById("songClearButton");
    const songEmptyText = document.getElementById("songEmptyText");

    function normalizeText(text) {
      return (text || "")
        .toString()
        .toLowerCase()
        .replace(/\uFEFF/g, "")           // BOM除去
        .replace(/\s+/g, "")
        .replace(/[　]/g, "")
        .replace(/[“”"'＂＇]/g, "")
        .replace(/[、。,.・]/g, "")
        .trim();
    }

    // 表示用の曲名を整える
    function cleanSongName(song) {
      return (song || "")
        .toString()
        .replace(/\uFEFF/g, "")
        .trim();
    }

    // 表記ゆれを統一（ここ大事）
    function canonicalSongName(song) {
      const cleaned = cleanSongName(song);
      const normalized = normalizeText(cleaned);

      const aliasMap = {
        "嘘やっぱ好きです": "嘘、やっぱ好きです。",
        "今更何様": "今更、何様？",
        "はたち": "はたち。",
        "メンヘラブストーリー": "メンヘラブストーリー"
      };

      return aliasMap[normalized] || cleaned;
    }

    // Apple Musicリンク取得（data.js の songLinks を使う）
    function getSongLink(songName) {
      if (typeof songLinks !== "undefined" && songLinks) {
        return songLinks[songName] || "";
      }
      return "";
    }

    // 全公演から曲を集める
    function collectSongs() {
      const songMap = new Map();

      liveData.forEach(live => {
        const songs = [
          ...(live.setlistMain || []),
          ...(live.setlistEncore || [])
        ];

        songs.forEach(song => {
          const canonical = canonicalSongName(song);
          const normalized = normalizeText(canonical);

          if (!normalized) return;

          if (!songMap.has(normalized)) {
            songMap.set(normalized, {
              displayName: canonical,
              count: 1
            });
          } else {
            songMap.get(normalized).count += 1;
          }
        });
      });

      return Array.from(songMap.values()).sort((a, b) => {
        // まず50音っぽく文字列ソート
        return a.displayName.localeCompare(b.displayName, "ja");
      });
    }

    const allSongs = collectSongs();

    function renderSongs() {
      const keyword = normalizeText(songListSearchInput.value);

      const filtered = allSongs.filter(song =>
        !keyword || normalizeText(song.displayName).includes(keyword)
      );

      songList.innerHTML = "";

      if (filtered.length === 0) {
        songEmptyText.style.display = "block";
      } else {
        songEmptyText.style.display = "none";
      }

      songCount.textContent = `${filtered.length}曲`;

      filtered.forEach(song => {
        const row = document.createElement("div");
        row.className = "song-row";

        const songLink = `index.html?song=${encodeURIComponent(song.displayName)}`;
        const appleLink = getSongLink(song.displayName);

        row.innerHTML = `
          <div class="song-row-main">
            <a href="${songLink}" class="song-name-link">${song.displayName}</a>
            <span class="song-live-count">${song.count}回</span>
          </div>

          <div class="song-row-actions">
            ${
              appleLink
                ? `<a href="${appleLink}" class="song-list-listen-btn" target="_blank" rel="noopener noreferrer" aria-label="${song.displayName} を Apple Music で聴く">▶︎</a>`
                : `<span class="song-list-listen-btn disabled" aria-hidden="true">-</span>`
            }
          </div>
        `;

        songList.appendChild(row);
      });
    }

    songListSearchInput.addEventListener("input", renderSongs);

    songClearButton.addEventListener("click", () => {
      songListSearchInput.value = "";
      renderSongs();
    });

    renderSongs();
  </script>
</body>
</html>
